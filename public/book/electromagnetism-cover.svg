<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1713 2655" role="img" aria-label="考える力を育てる 電磁気学 — 森 祐太" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2013"/>
      <stop offset="28%" stop-color="#23170b"/>
      <stop offset="100%" stop-color="#120d07"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9b668"/>
      <stop offset="60%" stop-color="#c4a258"/>
      <stop offset="100%" stop-color="#9a7c3c"/>
    </linearGradient>
    <radialGradient id="nucleus-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d591"/>
      <stop offset="60%" stop-color="#c4a258"/>
      <stop offset="100%" stop-color="#7a5e26"/>
    </radialGradient>
    <style>
      .jp-serif { font-family: "Shippori Mincho","Hiragino Mincho ProN","Noto Serif JP","Yu Mincho",serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1713" height="2655" fill="url(#bg-grad)"/>

  <!-- Thin frame -->
  <rect x="42" y="42" width="1629" height="2571" fill="none" stroke="#7a5e26" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Background formulas (very subtle) -->
  <g class="jp-serif" fill="#8a6c32" fill-opacity="0.16" font-style="italic">
    <text x="180" y="580" font-size="72">∮ E · dA = Q/ε₀</text>
    <text x="1180" y="900" font-size="66">dΦ_B / dt</text>
    <text x="960" y="1720" font-size="64">∇ · E = ρ/ε₀</text>
    <text x="180" y="2100" font-size="60">μ₀ε₀ ∂f/∂t</text>
    <text x="1090" y="2260" font-size="62">∇ × B = μ₀ J</text>
  </g>

  <!-- Top darker horizontal band -->
  <rect x="42" y="42" width="1629" height="760" fill="#0b0704" fill-opacity="0.4"/>

  <!-- Top-left diagonal banner -->
  <g transform="translate(-50 110) rotate(-14)">
    <rect x="0" y="0" width="640" height="110" fill="#4a3a24"/>
    <rect x="0" y="0" width="640" height="110" fill="none" stroke="#6e5629" stroke-width="2" stroke-opacity="0.6"/>
    <text x="320" y="72" text-anchor="middle" class="jp-serif" fill="#a68846" font-size="40" letter-spacing="4">
      難関国公立大志望者必見
    </text>
  </g>

  <!-- Tagline: 考える力を育てる -->
  <text x="1590" y="540" text-anchor="end" class="jp-serif" fill="#d9b668" font-size="88" letter-spacing="10">
    考える力を育てる
  </text>

  <!-- Main title 電磁気学 (centered, fits inside frame) -->
  <text x="856.5" y="1130" text-anchor="middle" class="jp-serif" fill="#f5ecd8" font-size="460" letter-spacing="24">電磁気学</text>

  <!-- Subject lists -->
  <g class="jp-serif" fill="#c9b696" text-anchor="middle">
    <text x="856.5" y="1330" font-size="54" letter-spacing="4">静電界｜磁界｜回路｜電磁力｜電磁誘導</text>
    <text x="856.5" y="1420" font-size="46" fill-opacity="0.85" letter-spacing="4">ガウスの法則｜ビオ・サバールの法則｜非線形抵抗</text>
  </g>

  <!-- Atomic orbitals (centerpiece) -->
  <g transform="translate(857 1900)">
    <!-- 3 main elliptical orbits -->
    <g fill="none" stroke="url(#gold-grad)" stroke-width="3.5">
      <ellipse rx="520" ry="210"/>
      <ellipse rx="520" ry="210" transform="rotate(60)"/>
      <ellipse rx="520" ry="210" transform="rotate(-60)"/>
    </g>
    <!-- Subtle secondary orbits -->
    <g fill="none" stroke="#c4a258" stroke-width="1.5" stroke-opacity="0.4">
      <ellipse rx="380" ry="150" transform="rotate(30)"/>
      <ellipse rx="380" ry="150" transform="rotate(-30)"/>
    </g>

    <!-- Electrons -->
    <g>
      <circle cx="505" cy="-45" r="18" fill="#e4cf9a"/>
      <circle cx="-260" cy="315" r="16" fill="#d6bf82"/>
      <circle cx="-220" cy="-370" r="14" fill="#b89343"/>
      <circle cx="350" cy="280" r="10" fill="#b89343" opacity="0.75"/>
    </g>

    <!-- Nucleus -->
    <circle r="72" fill="url(#nucleus-grad)"/>
    <circle r="72" fill="none" stroke="#9a7c3c" stroke-width="1.5" stroke-opacity="0.6"/>
    <text y="22" text-anchor="middle" class="jp-serif" fill="#23170b" font-size="70" font-weight="700">+</text>

    <!-- Tiny dots around for depth -->
    <g fill="#c4a258" opacity="0.5">
      <circle cx="0" cy="-620" r="4"/>
      <circle cx="600" cy="400" r="3"/>
      <circle cx="-620" cy="-80" r="4"/>
      <circle cx="-550" cy="450" r="2.5"/>
    </g>
  </g>

  <!-- Author name bottom right -->
  <g>
    <line x1="1180" y1="2490" x2="1580" y2="2490" stroke="#6e5629" stroke-width="1.5" stroke-opacity="0.45"/>
    <text x="1580" y="2558" text-anchor="end" class="jp-serif" fill="#f5ecd8" font-size="74" letter-spacing="18">森 祐太</text>
  </g>
</svg>
